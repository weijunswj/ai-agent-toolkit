name: Build agent rule templates

on:
  pull_request:
    paths:
      - _projects/n8n/local-setup/_main/templates/partials/**
      - skills/n8n-local-setup/templates/agent-rules/partials/**
      - repo/scripts/build-agent-rule-templates.ps1
      - repo/scripts/- build-agent-rule-templates.cmd
      - .github/workflows/build-agent-rule-templates.yml
  push:
    branches:
      - main
    paths:
      - _projects/n8n/local-setup/_main/templates/partials/**
      - skills/n8n-local-setup/templates/agent-rules/partials/**
      - repo/scripts/build-agent-rule-templates.ps1
      - repo/scripts/- build-agent-rule-templates.cmd
      - .github/workflows/build-agent-rule-templates.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-agent-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Regenerate templates
        shell: pwsh
        run: |
          ./repo/scripts/build-agent-rule-templates.ps1
          node repo/scripts/sync-toolkit-projects.cjs --write

      - name: Verify generated files are current
        run: |
          git diff --exit-code -- \
            _projects/n8n/local-setup/_main/templates/agent-rules/AGENTS.template.md \
            _projects/n8n/local-setup/_main/templates/agent-rules/CLAUDE.template.md \
            _projects/n8n/local-setup/_main/templates/agent-rules/GEMINI.template.md \
            skills/n8n-local-setup/templates/agent-rules/AGENTS.template.md \
            skills/n8n-local-setup/templates/agent-rules/CLAUDE.template.md \
            skills/n8n-local-setup/templates/agent-rules/GEMINI.template.md

      - name: Verify active skill template names are absent
        run: |
          test ! -e skills/n8n-local-setup/templates/agent-rules/AGENTS.md
          test ! -e skills/n8n-local-setup/templates/agent-rules/CLAUDE.md
          test ! -e skills/n8n-local-setup/templates/agent-rules/GEMINI.md
