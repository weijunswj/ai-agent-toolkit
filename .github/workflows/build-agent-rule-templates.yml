name: Build agent rule templates

on:
  pull_request:
    paths:
      - templates/agent-rules/partials/**
      - scripts/build-agent-rule-templates.ps1
      - .github/workflows/build-agent-rule-templates.yml
  push:
    branches:
      - main
    paths:
      - templates/agent-rules/partials/**
      - scripts/build-agent-rule-templates.ps1
      - .github/workflows/build-agent-rule-templates.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-agent-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Regenerate templates
        shell: pwsh
        run: ./scripts/build-agent-rule-templates.ps1

      - name: Fail if generated files are stale
        run: git diff --exit-code -- templates/agent-rules/AGENTS.md templates/agent-rules/CLAUDE.md templates/agent-rules/GEMINI.md
