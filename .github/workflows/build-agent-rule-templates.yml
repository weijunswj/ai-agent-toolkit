name: Build agent rule templates

on:
  pull_request:
    paths:
      - for_ai/templates/agent-rules/partials/**
      - repo/scripts/build-agent-rule-templates.ps1
      - repo/scripts/- build-agent-rule-templates.cmd
      - .github/workflows/build-agent-rule-templates.yml
  push:
    branches:
      - main
    paths:
      - for_ai/templates/agent-rules/partials/**
      - repo/scripts/build-agent-rule-templates.ps1
      - repo/scripts/- build-agent-rule-templates.cmd
      - .github/workflows/build-agent-rule-templates.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-agent-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Regenerate templates
        shell: pwsh
        run: ./repo/scripts/build-agent-rule-templates.ps1

      - name: Verify generated files are current
        run: git diff --exit-code -- for_ai/templates/agent-rules/AGENTS.md for_ai/templates/agent-rules/CLAUDE.md for_ai/templates/agent-rules/GEMINI.md
