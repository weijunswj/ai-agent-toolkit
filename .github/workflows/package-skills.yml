name: Package skills

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22

      - name: Check packaging inputs
        run: node repo/scripts/package-skills.cjs --check

      - name: Build skill artifacts
        if: github.event_name != 'pull_request'
        run: node repo/scripts/package-skills.cjs

      - name: Generate checksums
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse _dist | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
            "$($hash.Hash)  $($_.FullName.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, ''))"
          } | Set-Content -LiteralPath _dist/skills-checksums.txt

      - name: Upload skill artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: skill-artifacts
          path: _dist/
