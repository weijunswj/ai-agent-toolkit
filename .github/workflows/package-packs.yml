name: Package packs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-packs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check pack inputs
        run: node repo/scripts/package-packs.cjs --check

      - name: Build pack artifacts
        if: github.event_name != 'pull_request'
        run: node repo/scripts/package-packs.cjs

      - name: Generate checksums
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse _dist | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
            "$($hash.Hash)  $($_.FullName.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, ''))"
          } | Set-Content -LiteralPath _dist/packs-checksums.txt

      - name: Upload pack artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pack-artifacts
          path: _dist/
