name: Validate toolkit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check validator syntax
        run: node --check repo/scripts/validate-toolkit.cjs

      - name: Validate toolkit
        run: node repo/scripts/validate-toolkit.cjs

      - name: Run tests
        run: node --test repo/tests/*.test.cjs

      - name: Check whitespace
        run: git diff --check
