name: Validate toolkit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22

      - name: Check validator syntax
        run: node --check repo/scripts/validate-toolkit.cjs

      - name: Validate toolkit
        run: node repo/scripts/validate-toolkit.cjs

      - name: Run tests
        run: node --test repo/tests/*.test.cjs

      - name: Check whitespace
        run: git diff --check
