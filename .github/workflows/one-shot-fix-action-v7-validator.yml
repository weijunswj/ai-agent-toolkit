name: One-shot action v7 validator repair

on:
  push:
    branches:
      - fix/github-actions-v7-validator
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: >-
      github.repository == 'weijunswj/ai-agent-toolkit' &&
      (github.ref == 'refs/heads/fix/github-actions-v7-validator' ||
       github.head_ref == 'fix/github-actions-v7-validator')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v7
        with:
          ref: fix/github-actions-v7-validator
          fetch-depth: 0

      - name: Align validator and regression tests with action v7
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('repo/scripts/validate-toolkit.cjs'): {
                  'actions/checkout@v6': 'actions/checkout@v7',
                  'actions/setup-node@v6': 'actions/setup-node@v7',
              },
              Path('repo/tests/validate-toolkit.test.cjs'): {
                  'actions/checkout@v6': 'actions/checkout@v7',
                  'actions/setup-node@v6': 'actions/setup-node@v7',
              },
          }

          for path, mapping in replacements.items():
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in mapping.items():
                  count = text.count(old)
                  if count:
                      print(f'{path}: replacing {count} occurrence(s) of {old}')
                      text = text.replace(old, new)
                  elif new not in text:
                      raise SystemExit(f'{path}: neither {old} nor {new} is present')
              if text != original:
                  path.write_text(text, encoding='utf-8', newline='\n')

          for path in replacements:
              text = path.read_text(encoding='utf-8')
              if 'actions/checkout@v6' in text or 'actions/setup-node@v6' in text:
                  raise SystemExit(f'{path}: stale v6 action reference remains')
          PY

      - name: Run focused validation
        shell: bash
        run: |
          node repo/scripts/validate-toolkit.cjs
          node --test --test-name-pattern "auto-sync generated surfaces workflow" repo/tests/validate-toolkit.test.cjs
          git diff --check

      - name: Commit repair when needed
        shell: bash
        run: |
          if git diff --quiet -- repo/scripts/validate-toolkit.cjs repo/tests/validate-toolkit.test.cjs; then
            echo "Repair already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo/scripts/validate-toolkit.cjs repo/tests/validate-toolkit.test.cjs
          git commit -m "fix: align validator with GitHub Actions v7"
          git push origin HEAD:fix/github-actions-v7-validator
