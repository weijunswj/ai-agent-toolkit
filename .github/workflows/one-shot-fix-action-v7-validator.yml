name: One-shot action v7 validator repair

on:
  push:
    branches:
      - fix/github-actions-v7-validator
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: >-
      github.repository == 'weijunswj/ai-agent-toolkit' &&
      (github.ref == 'refs/heads/fix/github-actions-v7-validator' ||
       github.head_ref == 'fix/github-actions-v7-validator')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v7
        with:
          ref: fix/github-actions-v7-validator
          fetch-depth: 0
          show-progress: false

      - name: Align validator and regression tests with action v7
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');

          const replacements = new Map([
            ['repo/scripts/validate-toolkit.cjs', [
              ['actions/checkout@v6', 'actions/checkout@v7'],
              ['actions/setup-node@v6', 'actions/setup-node@v7']
            ]],
            ['repo/tests/validate-toolkit.test.cjs', [
              ['actions/checkout@v6', 'actions/checkout@v7'],
              ['actions/setup-node@v6', 'actions/setup-node@v7'],
              ['actions\\/checkout@v6', 'actions\\/checkout@v7'],
              ['actions\\/setup-node@v6', 'actions\\/setup-node@v7'],
              ['extra checkout v6 action after preflight is rejected', 'extra checkout v7 action after preflight is rejected']
            ]]
          ]);

          for (const [file, pairs] of replacements) {
            let text = fs.readFileSync(file, 'utf8');
            for (const [before, after] of pairs) {
              text = text.split(before).join(after);
            }
            fs.writeFileSync(file, text, 'utf8');
          }

          for (const file of replacements.keys()) {
            const text = fs.readFileSync(file, 'utf8');
            for (const stale of [
              'actions/checkout@v6',
              'actions/setup-node@v6',
              'actions\\/checkout@v6',
              'actions\\/setup-node@v6'
            ]) {
              if (text.includes(stale)) {
                throw new Error(`Stale action reference ${stale} remains in ${file}`);
              }
            }
          }
          NODE
          rm -f .github/workflows/one-shot-fix-action-v7-validator.yml

      - name: Run validator
        run: node repo/scripts/validate-toolkit.cjs

      - name: Run focused regression tests
        run: node --test --test-name-pattern "auto-sync generated surfaces workflow" repo/tests/validate-toolkit.test.cjs

      - name: Check whitespace
        run: git diff --check

      - name: Commit repair
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No repair changes found."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo/scripts/validate-toolkit.cjs repo/tests/validate-toolkit.test.cjs .github/workflows/one-shot-fix-action-v7-validator.yml
          git commit -m "fix: align validator with GitHub Actions v7"
          git push origin HEAD:fix/github-actions-v7-validator
