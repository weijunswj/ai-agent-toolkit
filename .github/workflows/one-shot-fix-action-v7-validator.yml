name: One-shot action v7 validator repair

on:
  push:
    branches:
      - fix/github-actions-v7-validator
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: >-
      github.repository == 'weijunswj/ai-agent-toolkit' &&
      (github.ref == 'refs/heads/fix/github-actions-v7-validator' ||
       github.head_ref == 'fix/github-actions-v7-validator')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v7
        with:
          ref: fix/github-actions-v7-validator
          fetch-depth: 0

      - name: Align validator and regression tests with action v7
        shell: bash
        run: |
          set -euo pipefail
          files=(
            repo/scripts/validate-toolkit.cjs
            repo/tests/validate-toolkit.test.cjs
          )
          for file in "${files[@]}"; do
            sed -i 's#actions/checkout@v6#actions/checkout@v7#g' "$file"
            sed -i 's#actions/setup-node@v6#actions/setup-node@v7#g' "$file"
            if grep -Fq 'actions/checkout@v6' "$file" || grep -Fq 'actions/setup-node@v6' "$file"; then
              echo "Stale v6 action reference remains in $file" >&2
              exit 1
            fi
          done
          rm -f .github/workflows/one-shot-fix-action-v7-validator.yml

      - name: Run validator
        run: node repo/scripts/validate-toolkit.cjs

      - name: Run focused regression tests
        run: node --test --test-name-pattern "auto-sync generated surfaces workflow" repo/tests/validate-toolkit.test.cjs

      - name: Check whitespace
        run: git diff --check

      - name: Commit repair
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No repair changes found."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo/scripts/validate-toolkit.cjs repo/tests/validate-toolkit.test.cjs .github/workflows/one-shot-fix-action-v7-validator.yml
          git commit -m "fix: align validator with GitHub Actions v7"
          git push origin HEAD:fix/github-actions-v7-validator
