name: Weekly Ecosystem Radar

# Scheduled only: this workflow has contents: write and pull-requests: write
# and may update only the generated weekly radar report path.
on:
  schedule:
    - cron: "37 6 * * 2"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-ecosystem-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/heads/main
          fetch-depth: 0
          persist-credentials: false

      - name: Assert trusted main checkout
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate source locks
        run: node repo/scripts/audit-project-source-locks.cjs

      - name: Check weekly ecosystem radar
        id: radar
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPORT_TEMP="$RUNNER_TEMP/weekly-ecosystem-radar.md"
          node repo/scripts/check-ecosystem-updates.cjs --report "$REPORT_TEMP"
          if [ -f "$REPORT_TEMP" ]; then
            echo "pr_needed=true" >> "$GITHUB_OUTPUT"
            echo "report_temp=$REPORT_TEMP" >> "$GITHUB_OUTPUT"
          else
            echo "pr_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update weekly radar branch
        id: update_branch
        if: steps.radar.outputs.pr_needed == 'true'
        env:
          BRANCH: ecosystem-radar/weekly-review
          GH_TOKEN: ${{ github.token }}
          REPORT_TEMP: ${{ steps.radar.outputs.report_temp }}
          REPORT_PATH: repo/source-watch/reviews/weekly-ecosystem-radar.md
        run: |
          set -euo pipefail
          test -f "$REPORT_TEMP"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          remote_sha="$(git ls-remote --heads origin "$BRANCH" | awk '{print $1}')"
          git switch -C "$BRANCH" origin/main
          mkdir -p "$(dirname "$REPORT_PATH")"
          if [ -L "$REPORT_PATH" ]; then
            echo "Refusing to overwrite symlink report path: $REPORT_PATH" >&2
            exit 1
          fi
          install -m 0644 "$REPORT_TEMP" "$REPORT_PATH"
          if [ ! -f "$REPORT_PATH" ] || [ -L "$REPORT_PATH" ]; then
            echo "Report path is not a regular file: $REPORT_PATH" >&2
            exit 1
          fi
          git add -- "$REPORT_PATH"
          staged_files="$(git diff --cached --name-only)"
          if [ "$staged_files" != "$REPORT_PATH" ]; then
            echo "Refusing to stage unexpected files:" >&2
            printf '%s\n' "$staged_files" >&2
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update weekly ecosystem radar report"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$BRANCH:$remote_sha" origin "HEAD:$BRANCH"
          else
            git push origin "HEAD:$BRANCH"
          fi
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Find existing weekly radar PR
        id: existing_pr
        if: steps.radar.outputs.pr_needed == 'true' && steps.update_branch.outputs.pushed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ecosystem-radar/weekly-review
        run: |
          set -euo pipefail
          if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update weekly radar PR
        if: steps.radar.outputs.pr_needed == 'true' && (steps.update_branch.outputs.pushed == 'true' || steps.existing_pr.outputs.exists == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ecosystem-radar/weekly-review
          PR_TITLE: "[ecosystem-radar] Weekly ecosystem radar review"
          PR_BODY: ${{ runner.temp }}/weekly-ecosystem-radar-pr-body.md
        run: |
          set -euo pipefail
          cat > "$PR_BODY" <<'EOF'
          This PR is a weekly ecosystem radar report only.
          The scheduled workflow stages only `repo/source-watch/reviews/weekly-ecosystem-radar.md`.
          No `_projects/**`, `SOURCE-LOCK.json`, generated `skills/**`, advisory baselines, provider or deployment config, secrets, or application code were staged by the workflow.
          No issues are created and no `issues: write` permission is requested.
          No source pins or advisory baselines were changed.
          No SOURCE-LOCK pins were changed.
          No upstream code was executed and no upstream packages were installed.
          No live deployment actions, provider calls, notification tests, or production mutations are allowed.
          No auto-merge is allowed.
          Advisory baseline advancement requires a separate human-approved PR.

          - [ ] Review source-lock drift manually before opening any source update PR.
          - [ ] Review advisory targets manually before changing baselines.
          - [ ] Keep source-pin and advisory-baseline changes in separate human-approved PRs.
          - [ ] Confirm no upstream code or package installation was run.
          - [ ] Confirm no live deployment, provider, notification, or production mutation occurred.
          EOF
          if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --repo "$GITHUB_REPOSITORY" --title "$PR_TITLE" --body-file "$PR_BODY"
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$BRANCH" --title "$PR_TITLE" --body-file "$PR_BODY"
          fi

      - name: Skip weekly radar PR without diff
        if: steps.radar.outputs.pr_needed == 'true' && steps.update_branch.outputs.pushed != 'true' && steps.existing_pr.outputs.exists != 'true'
        run: |
          set -euo pipefail
          {
            echo "## Weekly ecosystem radar"
            echo ""
            echo "The radar generated a report, but it matched the report already on main."
            echo "No report commit was pushed and no existing open radar PR was found, so no PR was created."
            echo ""
            echo "Only \`repo/source-watch/reviews/weekly-ecosystem-radar.md\` is an allowed scheduled write target."
          } >> "$GITHUB_STEP_SUMMARY"
