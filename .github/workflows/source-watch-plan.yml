name: Source Watch Advisory Plan

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Render advisory source update plan
        run: node repo/scripts/watch-project-sources.cjs >> "$GITHUB_STEP_SUMMARY"

      - name: Validate source locks
        run: node repo/scripts/audit-project-source-locks.cjs

      - name: Check project sync
        run: node repo/scripts/sync-toolkit-projects.cjs --check
