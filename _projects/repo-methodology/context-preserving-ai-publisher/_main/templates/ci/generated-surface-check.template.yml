name: Generated Surface Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  generated-surface-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Set up runtime
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "20"

      - name: Check generated surfaces
        run: |
          <sync check command>
          <audit check command>
          git diff --check
